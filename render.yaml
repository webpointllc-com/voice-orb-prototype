services:
  - type: web
    name: voice-orb-prototype
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: VOICE_ACCESS_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: WHISPER_URL
        sync: false
      - key: ECAPA_URL
        sync: false
