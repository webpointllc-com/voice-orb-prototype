services:
  - type: web
    name: voice-orb-prototype
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: WHISPER_SERVICE_URL
        sync: false        # Set this to your whisper-service Render URL after deploying
      - key: LLM_PROVIDER
        value: groq
      - key: OLLAMA_MODEL
        value: llama3.2:3b
