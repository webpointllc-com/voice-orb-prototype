services:
  - type: web
    name: voice-orb-prototype
    env: node
    plan: starter         # $7/mo — needed for Ollama RAM headroom (upgrade from free)
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: OLLAMA_URL
        value: ""          # Leave blank on Render — uses Groq fallback. Set to http://localhost:11434 for local dev.
      - key: OLLAMA_MODEL
        value: "llama3.2:3b"
      - key: LLM_PROVIDER
        value: "groq"      # "groq" | "ollama" — groq in prod, ollama for local dev
